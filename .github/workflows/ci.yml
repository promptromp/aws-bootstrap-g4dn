# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        # setuptools-scm derives the version from git history during `uv sync`.
        fetch-depth: 0
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: "3.13"
        version: "latest"
        enable-cache: true
    - name: Install the project
      run: uv sync --all-extras --dev
    - name: Run ruff lint and formatting checks
      run: |
        uv run ruff check aws_bootstrap
        uv run ruff format --check aws_bootstrap
    - name: Run mypy
      run: uv run mypy aws_bootstrap

  # Job id kept as `build` so the matrix emits the `build (3.x)` status checks
  # that the repository ruleset requires (the `lint` job above is additive).
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
      with:
        # setuptools-scm derives the version from git history during `uv sync`.
        fetch-depth: 0
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
        version: "latest"
        enable-cache: true
    - name: Install the project
      run: uv sync --all-extras --dev
    - name: Run tests
      run: uv run pytest
